<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Figcad</title>
    <style>
      /* ---- 라이트 테마 (Apple/ArchiCAD 풍 블랙&화이트) ---- */
      :root {
        --ink: #1d1d1f;
        --ink-soft: #6e6e73;
        --accent: #0a84ff;
        --glass: rgba(255, 255, 255, 0.78);
        --hairline: rgba(0, 0, 0, 0.08);
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        --radius: 12px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #f2f3f5;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #viewport {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #badge {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        color: rgba(0, 0, 0, 0.3);
        font-size: 11px;
        letter-spacing: 0.04em;
        pointer-events: none;
      }

      /* ---- 글래스 패널 공통 ---- */
      .toolbar,
      .props-panel,
      .view-nav {
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      /* ---- 툴바: 상단 중앙 필 ---- */
      .toolbar {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 5px;
        z-index: 20;
      }
      .toolbar button {
        padding: 9px 18px;
        border: none;
        border-radius: 9px;
        background: transparent;
        color: var(--ink);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s;
      }
      .toolbar button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .toolbar button.active {
        background: var(--ink);
        color: #fff;
      }
      .toolbar select {
        margin-left: 4px;
        padding: 8px 10px;
        border: 1px solid var(--hairline);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
      }

      /* ---- 속성 패널: 우상단 ---- */
      .props-panel {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        width: 216px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 20;
      }
      .props-panel h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .props-panel label {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        color: var(--ink-soft);
        letter-spacing: 0.03em;
      }
      .props-panel .readonly {
        color: var(--ink);
        font-size: 14px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }
      .props-panel input,
      .props-panel select {
        padding: 9px 10px;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.035);
        color: var(--ink);
        font-size: 14px;
        font-variant-numeric: tabular-nums;
        outline: none;
      }
      .props-panel input:focus,
      .props-panel select:focus {
        border-color: var(--accent);
      }
      .props-panel button.danger {
        margin-top: 2px;
        padding: 9px;
        border: none;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .props-panel button.danger:hover {
        background: rgba(215, 0, 21, 0.1);
      }

      /* ---- 뷰 내비게이터: 좌하단 (Revit Project Browser의 경량판) ---- */
      .view-nav {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 6px;
        min-width: 132px;
        z-index: 20;
      }
      .view-nav-title {
        padding: 4px 10px 6px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }
      .view-nav button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s;
      }
      .view-nav button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .view-nav button.active {
        background: var(--ink);
        color: #fff;
        font-weight: 600;
      }
      .view-nav button.add-level {
        color: var(--ink-soft);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <div id="ui-root"></div>
    <div id="badge">FIGCAD</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
