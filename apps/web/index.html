<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f2f3f5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>Figcad</title>
    <style>
      /* ---- 라이트 테마 (Apple/ArchiCAD 풍 블랙&화이트) ---- */
      :root {
        --ink: #1d1d1f;
        --ink-soft: #6e6e73;
        --accent: #0a84ff;
        --glass: rgba(255, 255, 255, 0.8);
        --hairline: rgba(0, 0, 0, 0.08);
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        --radius: 12px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #f2f3f5;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #viewport {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #badge {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        color: rgba(0, 0, 0, 0.3);
        font-size: 11px;
        letter-spacing: 0.04em;
        pointer-events: none;
      }

      /* ---- 글래스 패널 공통 ---- */
      .toolbox,
      .infobox,
      .navigator,
      .edit-actions,
      .quick-options {
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        z-index: 20;
      }

      /* ---- Toolbox: 좌측 세로 (ArchiCAD 4그룹) ---- */
      .toolbox {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 72px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        width: 104px;
        max-height: calc(100vh - 160px);
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toolbox-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .toolbox-group-title {
        padding: 2px 8px 4px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }
      .toolbox button {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s;
      }
      .toolbox button svg {
        flex-shrink: 0;
        color: var(--ink-soft);
      }
      .toolbox button.active svg {
        color: #fff;
      }
      .toolbox button:hover:not(:disabled) {
        background: rgba(0, 0, 0, 0.05);
      }
      .toolbox button.active {
        background: var(--ink);
        color: #fff;
        font-weight: 600;
      }
      .toolbox button:disabled {
        color: rgba(0, 0, 0, 0.25);
        cursor: default;
      }

      /* ---- Info Box: 상단 가로 (활성 도구/선택 요소 컨텍스트) ---- */
      .infobox {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 16px;
        max-width: calc(100vw - 460px);
        overflow-x: auto;
        white-space: nowrap;
      }
      .infobox-title {
        font-size: 13px;
        font-weight: 700;
        padding-right: 2px;
      }
      .infobox-field {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .infobox-field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .infobox-field .ro {
        font-size: 13px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }
      .infobox input,
      .infobox select {
        padding: 6px 8px;
        border: 1px solid var(--hairline);
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.035);
        color: var(--ink);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        outline: none;
        width: 86px;
      }
      .infobox select {
        width: auto;
        max-width: 150px;
      }
      .infobox input:focus,
      .infobox select:focus {
        border-color: var(--accent);
      }
      .infobox button.danger {
        padding: 6px 12px;
        border: none;
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .infobox button.danger:hover {
        background: rgba(215, 0, 21, 0.1);
      }
      .infobox-hint {
        font-size: 12px;
        color: var(--ink-soft);
      }

      /* ---- 편집 액션 팔레트 (펫팔레트 경량판) ---- */
      .edit-actions {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 64px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
      }
      .edit-actions button {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 11px;
        border: none;
        border-radius: 7px;
        background: transparent;
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .edit-actions button svg {
        color: var(--ink-soft);
      }
      .edit-actions button.active svg {
        color: #fff;
      }
      .edit-actions button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .edit-actions button.active {
        background: var(--accent);
        color: #fff;
      }
      .ea-param {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 4px;
      }
      .ea-param label {
        font-size: 10px;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .ea-param input {
        width: 52px;
        padding: 4px 6px;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.035);
      }
      .ea-hint {
        margin-left: 6px;
        font-size: 11px;
        color: var(--accent);
        font-weight: 600;
      }

      /* ---- Navigator: 우측 (프로젝트 맵 트리) ---- */
      .navigator {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 72px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        width: 188px;
        max-height: calc(100vh - 160px);
        overflow-y: auto;
        padding: 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-title {
        padding: 0 8px 6px;
        font-size: 12px;
        font-weight: 700;
      }
      .nav-section {
        padding: 4px 8px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }
      .nav-subsection {
        padding: 6px 8px 2px;
        font-size: 11px;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .nav-subsection.dim {
        color: rgba(0, 0, 0, 0.25);
      }
      .navigator .nav-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s;
      }
      .navigator .nav-item.indent {
        margin-left: 8px;
      }
      .navigator .nav-item:hover:not(:disabled) {
        background: rgba(0, 0, 0, 0.05);
      }
      .navigator .nav-item.active {
        background: var(--ink);
        color: #fff;
        font-weight: 600;
      }
      .navigator .nav-item.active .nav-meta {
        color: rgba(255, 255, 255, 0.6);
      }
      .navigator .nav-item:disabled {
        color: rgba(0, 0, 0, 0.25);
        cursor: default;
      }
      .navigator .nav-item.add {
        color: var(--ink-soft);
        font-size: 12px;
      }
      .nav-row {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .nav-row .nav-item {
        flex: 1;
      }
      .nav-edit {
        border: none;
        background: transparent;
        color: var(--ink-soft);
        font-size: 12px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
      }
      .nav-edit:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .nav-edit svg,
      .navigator .nav-item svg {
        color: var(--ink-soft);
        flex-shrink: 0;
        vertical-align: -2px;
      }
      .navigator .nav-item.active svg {
        color: #fff;
      }
      .nav-interop {
        justify-content: flex-start;
        gap: 7px;
      }
      .nav-interop .nav-meta {
        margin-left: auto;
      }
      .nav-editor {
        margin: 2px 8px 6px 16px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.04);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .nav-editor .infobox-field {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
      }
      .nav-editor label {
        font-size: 11px;
        color: var(--ink-soft);
      }
      .nav-editor input {
        width: 84px;
        padding: 4px 6px;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        font-size: 12px;
        background: #fff;
      }
      .nav-delete {
        border: none;
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
        font-size: 11px;
        font-weight: 600;
        padding: 6px;
        border-radius: 6px;
        cursor: pointer;
      }
      .nav-meta {
        font-size: 10px;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
      }
      .type-swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 3px;
        border: 1px solid var(--hairline);
        margin-right: 4px;
        vertical-align: -1px;
      }
      .nav-editor input[type='color'] {
        width: 40px;
        height: 24px;
        padding: 1px;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .nav-delete:disabled {
        color: rgba(0, 0, 0, 0.25);
        cursor: default;
      }

      /* ---- Quick Options Bar: 하단 ---- */
      .quick-options {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
      }
      .qo-view {
        font-size: 12px;
        font-weight: 600;
      }
      .qo-label {
        font-size: 12px;
        color: var(--ink-soft);
      }
      .qo-story {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--ink-soft);
      }
      .qo-story select {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        padding: 1px 4px;
        cursor: pointer;
      }
      .qo-sep {
        width: 1px;
        height: 16px;
        background: var(--hairline);
      }
      .qo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .qo-dot.connected {
        background: #34c759;
      }
      .qo-dot.connecting {
        background: #ff9500;
      }
      .qo-dot.offline {
        background: #ff3b30;
      }
      .quick-options button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        width: 26px;
        height: 26px;
        border: 1px solid var(--hairline);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        line-height: 1;
      }
      .quick-options button svg {
        color: var(--ink-soft);
      }
      .quick-options button.active svg,
      .quick-options button.qo-ai.active svg,
      .quick-options button.qo-lint.active svg {
        color: #fff;
      }
      .quick-options button.qo-lint.error svg {
        color: #d70015;
      }
      .quick-options button.qo-lint.warning svg {
        color: #b25000;
      }
      .quick-options button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .quick-options button.qo-ai {
        width: auto;
        padding: 0 10px;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .quick-options button.qo-ai.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .quick-options button.qo-lint {
        width: auto;
        padding: 0 10px;
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .quick-options button.qo-lint.error {
        color: #d70015;
        border-color: rgba(215, 0, 21, 0.4);
      }
      .quick-options button.qo-lint.warning {
        color: #b25000;
        border-color: rgba(178, 80, 0, 0.4);
      }
      .quick-options button.qo-lint.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      /* ---- 검사(lint) 패널 (좌하단, M5) ---- */
      .lint-panel {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        width: 320px;
        max-height: min(440px, calc(100vh - 200px));
        display: flex;
        flex-direction: column;
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        z-index: 30;
        overflow: hidden;
      }
      .lint-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .lint-merge-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin: 6px 6px 0;
        padding: 7px 9px;
        font-size: 12px;
        color: #7a4a00;
        background: #fff3d6;
        border: 1px solid #f0c674;
        border-radius: 6px;
        cursor: pointer;
      }
      .lint-merge-dismiss {
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 12px;
        color: inherit;
        opacity: 0.7;
      }
      .lint-clean {
        padding: 14px 10px;
        font-size: 12px;
        color: var(--ink-soft);
      }
      .lint-item {
        display: flex;
        align-items: flex-start;
        gap: 7px;
        padding: 7px 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .lint-item:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .lint-icon {
        font-size: 11px;
        line-height: 1.5;
        flex-shrink: 0;
      }
      .lint-msg {
        flex: 1;
        font-size: 11.5px;
        line-height: 1.45;
        word-break: keep-all;
      }
      .lint-fix {
        flex-shrink: 0;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.9);
        color: #d70015;
        font-size: 10.5px;
        font-weight: 600;
        padding: 3px 7px;
        cursor: pointer;
        white-space: nowrap;
      }
      .lint-fix:hover {
        background: rgba(215, 0, 21, 0.08);
      }

      /* ---- 버전 패널 (좌하단 — 검사 패널과 같은 슬롯, M6) ---- */
      .version-panel {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        width: 320px;
        max-height: min(480px, calc(100vh - 200px));
        display: flex;
        flex-direction: column;
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        z-index: 30;
        overflow: hidden;
      }
      .ver-commit {
        display: flex;
        gap: 6px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--hairline);
      }
      .ver-commit input {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.035);
        font-size: 12.5px;
        outline: none;
      }
      .ver-commit input:focus {
        border-color: var(--accent);
      }
      .ver-commit button {
        padding: 7px 12px;
        border: none;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .ver-commit button:disabled {
        opacity: 0.4;
      }
      .ver-notice {
        padding: 6px 12px;
        font-size: 11px;
        color: var(--ink-soft);
      }
      .ver-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .ver-item {
        padding: 7px 8px;
        border-radius: 8px;
      }
      .ver-item:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .ver-row1 {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }
      .ver-msg {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
        word-break: keep-all;
      }
      .ver-hash {
        font-size: 10px;
        color: var(--ink-soft);
        font-family: ui-monospace, monospace;
        flex-shrink: 0;
      }
      .ver-row2 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10.5px;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      .ver-actions {
        display: flex;
        gap: 4px;
      }
      .ver-actions button {
        border: 1px solid var(--hairline);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 10.5px;
        font-weight: 600;
        padding: 2px 7px;
        cursor: pointer;
      }
      .ver-actions button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .ver-diff {
        margin-top: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .ver-diff-summary {
        font-size: 11px;
        color: var(--ink-soft);
        margin-bottom: 2px;
      }
      .diff-added {
        font-size: 11px;
        color: #1f9d57;
        line-height: 1.4;
      }
      .diff-removed {
        font-size: 11px;
        color: #d23f3f;
        line-height: 1.4;
      }
      .diff-changed {
        font-size: 11px;
        color: #b25000;
        line-height: 1.4;
      }

      /* ---- AI 모드 패널 (우하단) ---- */
      .ai-panel {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        width: 340px;
        max-height: min(560px, calc(100vh - 200px));
        display: flex;
        flex-direction: column;
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        z-index: 30;
        overflow: hidden;
      }
      .ai-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--hairline);
      }
      .ai-title {
        font-size: 13px;
        font-weight: 700;
      }
      .ai-sub {
        flex: 1;
        font-size: 10px;
        color: var(--ink-soft);
      }
      .ai-close {
        border: none;
        background: transparent;
        color: var(--ink-soft);
        font-size: 12px;
        cursor: pointer;
        padding: 2px 4px;
      }
      .ai-msgs {
        flex: 1;
        overflow-y: auto;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 120px;
      }
      .ai-empty {
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.5;
      }
      .ai-msg {
        font-size: 12.5px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 10px;
        padding: 7px 10px;
        max-width: 92%;
      }
      .ai-msg.user {
        align-self: flex-end;
        background: var(--ink);
        color: #fff;
      }
      .ai-msg.assistant {
        align-self: flex-start;
        background: rgba(0, 0, 0, 0.05);
      }
      .ai-msg.notice {
        align-self: stretch;
        background: transparent;
        color: var(--ink-soft);
        font-size: 11px;
        padding: 0 2px;
      }
      .ai-plan {
        border: 1px solid var(--hairline);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.7);
        padding: 10px 12px;
      }
      .ai-plan-title {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .ai-plan-note {
        font-size: 11px;
        color: #b25000;
        margin-bottom: 4px;
      }
      .ai-plan ol {
        margin: 4px 0 8px;
        padding-left: 18px;
        font-size: 11.5px;
        line-height: 1.5;
        max-height: 160px;
        overflow-y: auto;
      }
      .ai-plan-lint {
        margin: 0 0 8px;
        font-size: 11px;
        line-height: 1.5;
      }
      .ai-lint-error {
        color: #d23f3f;
      }
      .ai-lint-warning,
      .ai-lint-info {
        color: #b25000;
      }
      .ai-plan-actions {
        display: flex;
        gap: 6px;
      }
      .ai-plan-actions button {
        flex: 1;
        padding: 7px 0;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .ai-approve {
        background: var(--ink);
        color: #fff;
      }
      .ai-reject {
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
      }
      .ai-input {
        display: flex;
        gap: 6px;
        padding: 10px 12px;
        border-top: 1px solid var(--hairline);
      }
      .ai-input input {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.035);
        font-size: 13px;
        outline: none;
      }
      .ai-input input:focus {
        border-color: var(--accent);
      }
      .ai-input button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .ai-input button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .ai-sketch-chip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 12px 8px;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(10, 132, 255, 0.1);
        border: 1px solid rgba(10, 132, 255, 0.3);
        font-size: 12px;
        color: var(--ink);
      }
      .ai-sketch-chip button {
        border: none;
        background: none;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 2px 4px;
      }
      /* 코멘트 패널 (M9-B) — 우측 도킹 */
      .cmt-panel {
        position: fixed;
        top: 96px;
        right: 12px;
        width: 280px;
        max-height: 60vh;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--hairline);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        z-index: 20;
        font-size: 13px;
      }
      .cmt-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--hairline);
      }
      .cmt-title {
        font-weight: 700;
        flex: 1;
      }
      .cmt-filter {
        font-size: 11px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .cmt-close {
        border: none;
        background: none;
        cursor: pointer;
        color: #888;
        font-size: 14px;
      }
      .cmt-list {
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cmt-empty {
        color: #999;
        font-size: 12px;
        padding: 12px 8px;
        line-height: 1.5;
      }
      .cmt-item {
        border: 1px solid var(--hairline);
        border-radius: 8px;
        padding: 8px;
      }
      .cmt-item.resolved {
        opacity: 0.55;
      }
      .cmt-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .cmt-jump {
        border: none;
        background: none;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
      }
      .cmt-author {
        font-weight: 600;
        font-size: 12px;
      }
      .cmt-actions {
        margin-left: auto;
        display: flex;
        gap: 4px;
      }
      .cmt-actions button {
        border: none;
        background: none;
        color: var(--accent);
        font-size: 11px;
        cursor: pointer;
        padding: 2px;
      }
      .cmt-actions .cmt-del {
        color: #c0392b;
      }
      .cmt-text {
        margin: 4px 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .cmt-reply {
        margin: 3px 0 3px 10px;
        padding-left: 8px;
        border-left: 2px solid var(--hairline);
        font-size: 12px;
      }
      .cmt-reply .cmt-author {
        margin-right: 5px;
      }
      .cmt-reply-input {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }
      .cmt-reply-input input {
        flex: 1;
        padding: 4px 8px;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        font-size: 12px;
        outline: none;
      }
      .cmt-reply-input button {
        border: none;
        background: var(--ink);
        color: #fff;
        border-radius: 6px;
        font-size: 11px;
        padding: 4px 8px;
        cursor: pointer;
      }
    </style>
  </head>

    <div id="ui-root"></div>
    <div id="badge">FIGCAD</div>
