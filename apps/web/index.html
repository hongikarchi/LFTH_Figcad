<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Figcad</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #1a1d21;
        font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      }
      #viewport {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #badge {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        color: rgba(255, 255, 255, 0.45);
        font-size: 12px;
        pointer-events: none;
      }

      /* --- React UI (패널만) --- */
      .toolbar {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        display: flex;
        gap: 8px;
        align-items: center;
        pointer-events: none;
      }
      .toolbar > * {
        pointer-events: auto;
      }
      .toolbar .spacer {
        flex: 1;
        pointer-events: none;
      }
      .toolbar button,
      .props-panel button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: #1a1d21;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .toolbar button.active {
        background: #2266ff;
        color: #fff;
      }
      .toolbar select,
      .props-panel select,
      .props-panel input {
        padding: 9px 10px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        font-size: 14px;
      }
      .props-panel {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 64px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        width: 220px;
        padding: 14px;
        border-radius: 12px;
        background: rgba(30, 34, 40, 0.92);
        color: #eee;
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      }
      .props-panel h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }
      .props-panel label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #aab;
      }
      .props-panel .readonly {
        color: #eee;
        font-size: 14px;
      }
      .props-panel button.danger {
        background: #e5484d;
        color: #fff;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <div id="ui-root"></div>
    <div id="badge">Figcad M1</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
