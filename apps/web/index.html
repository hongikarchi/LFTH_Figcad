<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Figcad</title>
    <style>
      /* ---- 라이트 테마 (Apple/ArchiCAD 풍 블랙&화이트) ---- */
      :root {
        --ink: #1d1d1f;
        --ink-soft: #6e6e73;
        --accent: #0a84ff;
        --glass: rgba(255, 255, 255, 0.8);
        --hairline: rgba(0, 0, 0, 0.08);
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        --radius: 12px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #f2f3f5;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #viewport {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #badge {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        color: rgba(0, 0, 0, 0.3);
        font-size: 11px;
        letter-spacing: 0.04em;
        pointer-events: none;
      }

      /* ---- 글래스 패널 공통 ---- */
      .toolbox,
      .infobox,
      .navigator,
      .quick-options {
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        backdrop-filter: blur(24px) saturate(1.6);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        z-index: 20;
      }

      /* ---- Toolbox: 좌측 세로 (ArchiCAD 4그룹) ---- */
      .toolbox {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 72px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        width: 104px;
        max-height: calc(100vh - 160px);
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toolbox-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .toolbox-group-title {
        padding: 2px 8px 4px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }
      .toolbox button {
        padding: 7px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s;
      }
      .toolbox button:hover:not(:disabled) {
        background: rgba(0, 0, 0, 0.05);
      }
      .toolbox button.active {
        background: var(--ink);
        color: #fff;
        font-weight: 600;
      }
      .toolbox button:disabled {
        color: rgba(0, 0, 0, 0.25);
        cursor: default;
      }

      /* ---- Info Box: 상단 가로 (활성 도구/선택 요소 컨텍스트) ---- */
      .infobox {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 16px;
        max-width: calc(100vw - 460px);
        overflow-x: auto;
        white-space: nowrap;
      }
      .infobox-title {
        font-size: 13px;
        font-weight: 700;
        padding-right: 2px;
      }
      .infobox-field {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .infobox-field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .infobox-field .ro {
        font-size: 13px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }
      .infobox input,
      .infobox select {
        padding: 6px 8px;
        border: 1px solid var(--hairline);
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.035);
        color: var(--ink);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        outline: none;
        width: 86px;
      }
      .infobox select {
        width: auto;
        max-width: 150px;
      }
      .infobox input:focus,
      .infobox select:focus {
        border-color: var(--accent);
      }
      .infobox button.danger {
        padding: 6px 12px;
        border: none;
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .infobox button.danger:hover {
        background: rgba(215, 0, 21, 0.1);
      }
      .infobox-hint {
        font-size: 12px;
        color: var(--ink-soft);
      }

      /* ---- Navigator: 우측 (프로젝트 맵 트리) ---- */
      .navigator {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 72px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        width: 188px;
        max-height: calc(100vh - 160px);
        overflow-y: auto;
        padding: 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-title {
        padding: 0 8px 6px;
        font-size: 12px;
        font-weight: 700;
      }
      .nav-section {
        padding: 4px 8px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }
      .nav-subsection {
        padding: 6px 8px 2px;
        font-size: 11px;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .nav-subsection.dim {
        color: rgba(0, 0, 0, 0.25);
      }
      .navigator .nav-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s;
      }
      .navigator .nav-item.indent {
        margin-left: 8px;
      }
      .navigator .nav-item:hover:not(:disabled) {
        background: rgba(0, 0, 0, 0.05);
      }
      .navigator .nav-item.active {
        background: var(--ink);
        color: #fff;
        font-weight: 600;
      }
      .navigator .nav-item.active .nav-meta {
        color: rgba(255, 255, 255, 0.6);
      }
      .navigator .nav-item:disabled {
        color: rgba(0, 0, 0, 0.25);
        cursor: default;
      }
      .navigator .nav-item.add {
        color: var(--ink-soft);
        font-size: 12px;
      }
      .nav-row {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .nav-row .nav-item {
        flex: 1;
      }
      .nav-edit {
        border: none;
        background: transparent;
        color: var(--ink-soft);
        font-size: 12px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
      }
      .nav-edit:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .nav-editor {
        margin: 2px 8px 6px 16px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.04);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .nav-editor label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--ink-soft);
      }
      .nav-editor input {
        width: 84px;
        padding: 4px 6px;
        border: 1px solid var(--hairline);
        border-radius: 6px;
        font-size: 12px;
        background: #fff;
      }
      .nav-delete {
        border: none;
        background: rgba(0, 0, 0, 0.05);
        color: #d70015;
        font-size: 11px;
        font-weight: 600;
        padding: 6px;
        border-radius: 6px;
        cursor: pointer;
      }
      .nav-meta {
        font-size: 10px;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
      }

      /* ---- Quick Options Bar: 하단 ---- */
      .quick-options {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
      }
      .qo-view {
        font-size: 12px;
        font-weight: 600;
      }
      .qo-label {
        font-size: 12px;
        color: var(--ink-soft);
      }
      .qo-sep {
        width: 1px;
        height: 16px;
        background: var(--hairline);
      }
      .qo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .qo-dot.connected {
        background: #34c759;
      }
      .qo-dot.connecting {
        background: #ff9500;
      }
      .qo-dot.offline {
        background: #ff3b30;
      }
      .quick-options button {
        width: 26px;
        height: 26px;
        border: 1px solid var(--hairline);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        line-height: 1;
      }
      .quick-options button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <div id="ui-root"></div>
    <div id="badge">FIGCAD</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
